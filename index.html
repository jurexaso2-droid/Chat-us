<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        .active-view { display: block; }
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; }
        iframe { width: 100%; height: calc(100vh - 64px); border: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- LOGIN / SIGNUP OVERLAY -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="max-w-md w-full border p-8 rounded-lg shadow-lg bg-white">
            <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">Login</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="auth-password" placeholder="Password" class="w-full p-2 mb-4 border rounded">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
            <p class="mt-4 text-center text-sm">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <a href="#" onclick="toggleAuthMode()" id="auth-toggle-link" class="text-blue-600">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE (Hidden until login) -->
    <div id="app-content" class="hidden">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center sticky top-0 z-40 shadow-md">
            <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
            <h1 id="view-title" class="text-xl font-bold">Home</h1>
            <button onclick="logout()" class="text-sm bg-red-500 px-3 py-1 rounded">Logout</button>
        </header>

        <!-- Sidebar (Hamburger Menu) -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-800 text-white transform -translate-x-full">
            <div class="p-4 text-right">
                <button onclick="toggleMenu()" class="text-2xl">&times;</button>
            </div>
            <nav class="flex flex-col p-4 space-y-4">
                <a href="#" onclick="switchView('home', 'Home')" class="flex items-center space-x-2"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="#" onclick="switchView('chat', 'Global Chat')" class="flex items-center space-x-2"><i class="fas fa-comments"></i> <span>Global Chat</span></a>
                <a href="#" onclick="switchView('webview', 'External Tool')" class="flex items-center space-x-2"><i class="fas fa-globe"></i> <span>External Tool</span></a>
                <a href="#" onclick="switchView('profile', 'My Profile')" class="flex items-center space-x-2"><i class="fas fa-user"></i> <span>My Profile</span></a>
            </nav>
        </div>

        <!-- VIEWS -->
        <main class="p-4 max-w-2xl mx-auto">
            
            <!-- 1. Home View (Posts) -->
            <section id="view-home" class="view">
                <div class="bg-white p-4 rounded shadow mb-6">
                    <textarea id="post-input" class="w-full border p-2 rounded" placeholder="What's on your mind?"></textarea>
                    <button onclick="createPost()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">Post</button>
                </div>
                <div id="posts-container" class="space-y-4"></div>
            </section>

            <!-- 2. Global Chat View -->
            <section id="view-chat" class="view hidden">
                <div class="bg-white rounded shadow flex flex-col h-[80vh]">
                    <div id="chat-messages" class="chat-container p-4 space-y-3"></div>
                    <div class="p-4 border-t flex">
                        <input type="text" id="chat-input" class="flex-1 border p-2 rounded-l" placeholder="Type a message...">
                        <button onclick="sendChatMessage()" class="bg-blue-600 text-white px-4 rounded-r">Send</button>
                    </div>
                </div>
            </section>

            <!-- 3. WebView View -->
            <section id="view-webview" class="view hidden -mx-4 -mt-4">
                <!-- Replace 'https://www.wikipedia.org' with your website URL -->
                <iframe src="https://www.wikipedia.org" id="custom-webview"></iframe>
            </section>

            <!-- 4. Profile View -->
            <section id="view-profile" class="view hidden">
                <div class="bg-white p-6 rounded shadow text-center">
                    <img id="profile-display-pic" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full mx-auto mb-4 border shadow">
                    <h3 id="profile-display-name" class="font-bold text-xl mb-6">User Name</h3>
                    
                    <div class="text-left space-y-4">
                        <div>
                            <label class="block text-sm font-bold">Nickname</label>
                            <input type="text" id="pref-nickname" class="w-full border p-2 rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-bold">Photo URL</label>
                            <input type="text" id="pref-pic-url" class="w-full border p-2 rounded" placeholder="https://example.com/photo.jpg">
                        </div>
                        <button onclick="updateProfile()" class="w-full bg-green-600 text-white p-2 rounded">Update Profile</button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD3YI2tkFYBGyYJ7K3M1JC_tddAc7APC0Q",
            authDomain: "database-rex123.firebaseapp.com",
            projectId: "database-rex123",
            storageBucket: "database-rex123.firebasestorage.app",
            messagingSenderId: "660443520086",
            appId: "1:660443520086:web:5bd29ce8e9222b61d12ff7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let isSignUp = false;

        // --- AUTH LOGIC ---
        window.toggleAuthMode = () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "Sign Up" : "Login";
            document.getElementById('auth-btn').innerText = isSignUp ? "Sign Up" : "Login";
            document.getElementById('auth-toggle-text').innerText = isSignUp ? "Already have an account?" : "Don't have an account?";
            document.getElementById('auth-toggle-link').innerText = isSignUp ? "Login" : "Sign Up";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            try {
                if (isSignUp) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { nickname: "New User", photo: "https://via.placeholder.com/100" });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadProfile();
                listenToPosts();
                listenToChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // --- UI NAVIGATION ---
        window.toggleMenu = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.transform = sidebar.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        };

        window.switchView = (viewId, title) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            document.getElementById('view-title').innerText = title;
            toggleMenu();
        };

        // --- PROFILE LOGIC ---
        async function loadProfile() {
            const docRef = doc(db, "users", currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('profile-display-name').innerText = data.nickname;
                document.getElementById('profile-display-pic').src = data.photo;
                document.getElementById('pref-nickname').value = data.nickname;
                document.getElementById('pref-pic-url').value = data.photo;
            }
        }

        window.updateProfile = async () => {
            const nick = document.getElementById('pref-nickname').value;
            const pic = document.getElementById('pref-pic-url').value;
            await updateDoc(doc(db, "users", currentUser.uid), { nickname: nick, photo: pic });
            alert("Profile Updated!");
            loadProfile();
        };

        // --- HOME / POSTS LOGIC ---
        window.createPost = async () => {
            const text = document.getElementById('post-input').value;
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            const userData = userSnap.data();
            if(!text) return;
            await addDoc(collection(db, "posts"), {
                uid: currentUser.uid,
                author: userData.nickname,
                photo: userData.photo,
                text: text,
                likes: 0,
                comments: [],
                timestamp: Date.now()
            });
            document.getElementById('post-input').value = "";
        };

        function listenToPosts() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const post = docSnap.data();
                    const id = docSnap.id;
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded shadow";
                    div.innerHTML = `
                        <div class="flex items-center space-x-3 mb-2">
                            <img src="${post.photo}" class="w-10 h-10 rounded-full">
                            <span class="font-bold">${post.author}</span>
                        </div>
                        <p class="mb-3">${post.text}</p>
                        <div class="flex items-center space-x-4 border-t pt-2 text-gray-600">
                            <button onclick="likePost('${id}')"><i class="far fa-thumbs-up"></i> ${post.likes}</button>
                            <span><i class="far fa-comment"></i> ${post.comments.length}</span>
                        </div>
                        <div class="mt-2 text-sm">
                            ${post.comments.map(c => `<div class="bg-gray-50 p-1 mb-1 rounded"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                            <input type="text" placeholder="Comment..." class="w-full mt-2 p-1 border rounded" onkeydown="addComment(event, '${id}')">
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.likePost = async (id) => {
            await updateDoc(doc(db, "posts", id), { likes: increment(1) });
        };

        window.addComment = async (e, id) => {
            if(e.key === 'Enter' && e.target.value) {
                const userSnap = await getDoc(doc(db, "users", currentUser.uid));
                await updateDoc(doc(db, "posts", id), {
                    comments: arrayUnion({ user: userSnap.data().nickname, text: e.target.value })
                });
                e.target.value = "";
            }
        };

        // --- CHAT LOGIC ---
        window.sendChatMessage = async () => {
            const msg = document.getElementById('chat-input').value;
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            if(!msg) return;
            await addDoc(collection(db, "messages"), {
                uid: currentUser.uid,
                author: userSnap.data().nickname,
                text: msg,
                timestamp: Date.now()
            });
            document.getElementById('chat-input').value = "";
        };

        function listenToChat() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const m = docSnap.data();
                    const isMe = m.uid === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = `
                        <div class="${isMe ? 'bg-blue-500 text-white' : 'bg-gray-200'} p-2 rounded-lg max-w-[80%]">
                            <div class="text-[10px] opacity-75">${m.author}</div>
                            <div>${m.text}</div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
